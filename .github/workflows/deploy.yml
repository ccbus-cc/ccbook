name: Deploy CCBook to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run docs:build

      # Remove the CNAME from the build artifact so GitHub Pages serves
      # this as a project page at ccbus-cc.github.io/ccbook/ rather than
      # trying to use the ccbook.ccbus.cc custom domain (which has no DNS).
      # The source CNAME is preserved in docs/public/CNAME for when DNS is set up.
      - name: Remove CNAME from build artifact
        run: rm -f docs/.vitepress/dist/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
